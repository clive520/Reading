<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>閱讀認證系統 - 教室管理版</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/@phosphor-icons/web"></script>
  <style>
    body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f3f4f6; }
    .view-section { display: none; animation: fadeIn 0.3s ease-in-out; }
    .view-section.active { display: block; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    #drawing-canvas { border: 2px dashed #cbd5e1; border-radius: 0.5rem; touch-action: none; background-color: #fff; cursor: crosshair; }
  </style>
</head>
<body class="text-gray-800">

  <!-- 導覽列 -->
  <nav class="bg-blue-600 text-white shadow-md p-4 flex justify-between items-center sticky top-0 z-40">
    <div class="flex items-center gap-2 font-bold text-xl">
      <i class="ph-fill ph-book-open-text text-2xl"></i>
      閱讀認證小幫手 (本機測試版)
    </div>
    <div class="flex items-center gap-3">
      <button onclick="clearAllData()" class="hover:bg-red-500 p-2 rounded text-sm transition bg-red-400">重置所有資料</button>
      <button id="logout-btn" onclick="logout()" class="hidden bg-red-500 hover:bg-red-600 px-3 py-1 rounded text-sm transition">登出</button>
    </div>
  </nav>

  <!-- 全局提示框 -->
  <div id="msg-modal" class="fixed inset-0 bg-black/50 z-50 hidden flex items-center justify-center">
    <div class="bg-white rounded-lg p-6 max-w-sm w-full shadow-xl text-center m-4">
      <div id="msg-icon" class="text-4xl mb-3 text-blue-500"><i class="ph-fill ph-info"></i></div>
      <h3 id="msg-title" class="text-lg font-bold mb-2">提示</h3>
      <p id="msg-content" class="text-gray-600 mb-5"></p>
      <button onclick="closeMsgModal()" class="w-full bg-blue-600 text-white py-2 rounded-lg hover:bg-blue-700 transition">確定</button>
    </div>
  </div>

  <main class="container mx-auto p-4 max-w-4xl mt-4">
    
    <!-- ==================== 視圖 1: 登入 ==================== -->
    <section id="view-login" class="view-section active max-w-md mx-auto bg-white p-8 rounded-xl shadow-sm border border-gray-100">
      <div class="flex justify-center mb-6 border-b pb-2 gap-4">
        <button id="tab-student" onclick="switchLoginTab('student')" class="text-lg font-bold text-blue-600 border-b-2 border-blue-600 px-2 pb-1">我是學生</button>
        <button id="tab-teacher" onclick="switchLoginTab('teacher')" class="text-lg font-bold text-gray-400 px-2 pb-1">我是老師</button>
      </div>
      
      <form id="login-form" onsubmit="handleLogin(event)" class="space-y-4">
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1" id="lbl-account">學生帳號</label>
          <input type="text" id="login-account" required class="w-full p-3 border rounded-lg focus:ring focus:ring-blue-200">
        </div>
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1">密碼</label>
          <input type="password" id="login-password" required class="w-full p-3 border rounded-lg focus:ring focus:ring-blue-200">
        </div>
        <button type="submit" class="w-full bg-blue-600 text-white p-3 rounded-lg font-bold hover:bg-blue-700 transition">登入系統</button>
      </form>
      
      <div id="teacher-hint" class="mt-4 text-xs text-center text-gray-500 hidden">
        (測試版預設教師帳號: admin / 密碼: admin)
      </div>
    </section>

    <!-- ==================== 視圖 2: 教師後台 ==================== -->
    <section id="view-teacher" class="view-section">
      <div class="bg-white p-6 rounded-xl shadow-sm mb-6 flex justify-between items-center">
        <div>
          <h2 class="text-2xl font-bold text-gray-800">教師管理後台</h2>
          <p class="text-gray-500" id="teacher-welcome">歡迎回來，老師！</p>
        </div>
      </div>

      <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
        <!-- 左側：班級列表 -->
        <div class="col-span-1 bg-white p-4 rounded-xl shadow-sm border border-gray-100">
          <h3 class="font-bold text-lg mb-4 flex items-center justify-between">
            <span>班級列表</span>
            <button onclick="addClass()" class="text-sm bg-blue-100 text-blue-600 px-2 py-1 rounded hover:bg-blue-200"><i class="ph ph-plus"></i> 新增</button>
          </h3>
          <ul id="class-list" class="space-y-2">
            <!-- 班級列表動態生成 -->
          </ul>
        </div>

        <!-- 右側：學生管理 -->
        <div class="col-span-1 md:col-span-2 bg-white p-4 rounded-xl shadow-sm border border-gray-100">
          <div id="student-manager-empty" class="text-center text-gray-400 py-10">
            請先從左側選擇一個班級以管理學生。
          </div>
          
          <div id="student-manager-content" class="hidden">
            <h3 class="font-bold text-lg mb-2 flex items-center justify-between">
              <span id="current-class-name-display">目前班級：--</span>
              <button onclick="editCurrentClass()" class="text-xs bg-gray-100 text-gray-600 px-2 py-1 rounded hover:bg-gray-200">修改班級名稱</button>
            </h3>
            
            <div class="bg-blue-50 p-4 rounded-lg mb-4 flex flex-col gap-2">
              <h4 class="font-bold text-blue-800 text-sm">批次新增學生</h4>
              <div class="flex gap-2">
                 <input type="number" id="batch-student-count" min="1" max="50" value="5" class="w-20 p-2 border rounded" placeholder="數量">
                 <input type="text" id="batch-student-prefix" class="flex-1 p-2 border rounded" placeholder="帳號前綴 (例: S01)">
                 <button onclick="batchCreateStudents()" class="bg-blue-600 text-white px-4 py-2 rounded hover:bg-blue-700">批次建立</button>
              </div>
              <p class="text-xs text-blue-600">系統將自動產生帳號 (前綴+編號) 與隨機 6 碼密碼。</p>
            </div>

            <div class="overflow-x-auto">
              <table class="w-full text-left text-sm border-collapse">
                <thead>
                  <tr class="bg-gray-100">
                    <th class="p-2 border-b">學生帳號</th>
                    <th class="p-2 border-b">姓名</th>
                    <th class="p-2 border-b">密碼 (點擊可見)</th>
                    <th class="p-2 border-b w-24">操作</th>
                  </tr>
                </thead>
                <tbody id="student-list-tbody">
                  <!-- 學生列表動態生成 -->
                </tbody>
              </table>
            </div>
          </div>
        </div>
      </div>
    </section>

    <!-- ==================== 視圖 3: 學生前台 ==================== -->
    <section id="view-student" class="view-section">
      <div class="bg-white p-6 rounded-xl shadow-sm mb-6 text-center py-20">
        <h2 class="text-3xl font-bold text-green-600 mb-2" id="student-welcome">歡迎！</h2>
        <p class="text-gray-500 text-lg">學生測驗區建置中...</p>
        <p class="text-gray-400 mt-4">請使用您分配到的帳號密碼登入。</p>
      </div>
    </section>

  </main>

  <script>
    /* =========================================
       資料狀態管理 (In-Memory / LocalStorage)
    ========================================= */
    // 預設資料結構
    const defaultData = {
      teachers: [{ account: 'admin', password: 'admin', name: '管理員' }],
      classes: [], // { id: 'c1', name: '一年甲班' }
      students: [] // { account: 'S0101', name: '王小明', password: 'abc', classId: 'c1' }
    };

    // 初始化資料
    let db = JSON.parse(localStorage.getItem('readingAppDB')) || defaultData;
    
    function saveDB() {
      localStorage.setItem('readingAppDB', JSON.stringify(db));
    }

    const STATE = {
      user: null,
      role: 'student',
      loginTab: 'student',
      currentClassId: null
    };

    window.onload = () => { checkLoginState(); };

    /* =========================================
       UI 共用工具
    ========================================= */
    function showMsg(title, content, type = 'info') {
      document.getElementById('msg-title').innerText = title;
      document.getElementById('msg-content').innerText = content;
      document.getElementById('msg-icon').innerHTML = type === 'error' ? '<i class="ph-fill ph-warning-circle text-red-500"></i>' : (type === 'success' ? '<i class="ph-fill ph-check-circle text-green-500"></i>' : '<i class="ph-fill ph-info text-blue-500"></i>');
      document.getElementById('msg-modal').classList.remove('hidden');
    }
    function closeMsgModal() { document.getElementById('msg-modal').classList.add('hidden'); }
    function switchView(viewId) {
      document.querySelectorAll('.view-section').forEach(el => el.classList.remove('active'));
      document.getElementById(viewId).classList.add('active');
    }

    function clearAllData() {
      if(confirm('警告：確定要刪除所有本機測試資料嗎？')) {
        localStorage.removeItem('readingAppDB');
        location.reload();
      }
    }

    /* =========================================
       登入邏輯
    ========================================= */
    function switchLoginTab(role) {
      STATE.loginTab = role;
      document.getElementById('tab-student').className = role === 'student' ? 'text-lg font-bold text-blue-600 border-b-2 border-blue-600 px-2 pb-1' : 'text-lg font-bold text-gray-400 px-2 pb-1';
      document.getElementById('tab-teacher').className = role === 'teacher' ? 'text-lg font-bold text-blue-600 border-b-2 border-blue-600 px-2 pb-1' : 'text-lg font-bold text-gray-400 px-2 pb-1';
      document.getElementById('lbl-account').innerText = role === 'student' ? '學生帳號' : '教師帳號';
      document.getElementById('teacher-hint').style.display = role === 'teacher' ? 'block' : 'none';
    }

    function handleLogin(e) {
      e.preventDefault();
      const acc = document.getElementById('login-account').value.trim();
      const pwd = document.getElementById('login-password').value.trim();
      
      let foundUser = null;
      if (STATE.loginTab === 'teacher') {
        foundUser = db.teachers.find(t => t.account === acc && t.password === pwd);
      } else {
        foundUser = db.students.find(s => s.account === acc && s.password === pwd);
      }

      if (foundUser) {
        STATE.user = foundUser;
        STATE.role = STATE.loginTab;
        document.getElementById('login-form').reset();
        checkLoginState();
      } else {
        showMsg('登入失敗', '帳號或密碼錯誤', 'error');
      }
    }

    function logout() {
      STATE.user = null;
      checkLoginState();
    }

    function checkLoginState() {
      if (STATE.user) {
        document.getElementById('logout-btn').classList.remove('hidden');
        if (STATE.role === 'teacher') {
          switchView('view-teacher');
          renderClassList();
        } else {
          switchView('view-student');
          document.getElementById('student-welcome').innerText = `${STATE.user.name} 同學，歡迎！`;
        }
      } else {
        document.getElementById('logout-btn').classList.add('hidden');
        switchView('view-login');
      }
    }

    /* =========================================
       教師後台 - 班級與學生管理
    ========================================= */
    // 產生隨機 6 碼英數密碼
    function generateRandomPassword() {
      const chars = 'ABCDEFGHJKLMNPQRSTUVWXYZabcdefghijkmnpqrstuvwxyz23456789';
      let pwd = '';
      for (let i = 0; i < 6; i++) {
        pwd += chars.charAt(Math.floor(Math.random() * chars.length));
      }
      return pwd;
    }

    // --- 班級操作 ---
    function renderClassList() {
      const list = document.getElementById('class-list');
      list.innerHTML = '';
      if (db.classes.length === 0) {
        list.innerHTML = '<li class="text-gray-400 text-sm text-center py-4">尚無班級</li>';
        return;
      }

      db.classes.forEach(c => {
        const li = document.createElement('li');
        const isActive = STATE.currentClassId === c.id;
        li.className = `p-3 rounded cursor-pointer transition flex justify-between items-center ${isActive ? 'bg-blue-100 border-l-4 border-blue-500 font-bold' : 'bg-gray-50 hover:bg-gray-100'}`;
        li.innerHTML = `<span>${c.name}</span> <span class="text-xs text-gray-400">${db.students.filter(s=>s.classId===c.id).length}人</span>`;
        li.onclick = () => selectClass(c.id);
        list.appendChild(li);
      });
    }

    function addClass() {
      const name = prompt('請輸入新班級名稱 (例如: 一年甲班)');
      if (name && name.trim()) {
        const newClass = { id: 'C' + Date.now(), name: name.trim() };
        db.classes.push(newClass);
        saveDB();
        renderClassList();
        selectClass(newClass.id);
      }
    }

    function selectClass(classId) {
      STATE.currentClassId = classId;
      renderClassList(); // 更新左側 Highlight
      
      const c = db.classes.find(x => x.id === classId);
      if (c) {
        document.getElementById('student-manager-empty').classList.add('hidden');
        document.getElementById('student-manager-content').classList.remove('hidden');
        document.getElementById('current-class-name-display').innerText = `目前班級：${c.name}`;
        renderStudentList();
      }
    }

    function editCurrentClass() {
      const c = db.classes.find(x => x.id === STATE.currentClassId);
      if(!c) return;
      const newName = prompt('修改班級名稱：', c.name);
      if (newName && newName.trim()) {
        c.name = newName.trim();
        saveDB();
        renderClassList();
        document.getElementById('current-class-name-display').innerText = `目前班級：${c.name}`;
      }
    }

    // --- 學生操作 ---
    function renderStudentList() {
      const tbody = document.getElementById('student-list-tbody');
      tbody.innerHTML = '';
      const studentsInClass = db.students.filter(s => s.classId === STATE.currentClassId);

      if (studentsInClass.length === 0) {
        tbody.innerHTML = '<tr><td colspan="4" class="text-center py-4 text-gray-400">尚無學生資料</td></tr>';
        return;
      }

      // 排序一下，依據帳號
      studentsInClass.sort((a,b) => a.account.localeCompare(b.account));

      studentsInClass.forEach(s => {
        const tr = document.createElement('tr');
        tr.className = 'border-b hover:bg-gray-50';
        tr.innerHTML = `
          <td class="p-2">${s.account}</td>
          <td class="p-2 font-medium">${s.name || '(未設定)'}</td>
          <td class="p-2">
             <span class="bg-gray-200 text-transparent hover:text-gray-800 cursor-pointer px-2 py-1 rounded select-all font-mono text-xs transition-colors" title="點擊顯示密碼">
               ${s.password}
             </span>
          </td>
          <td class="p-2">
            <button onclick="editStudent('${s.account}')" class="text-blue-500 hover:underline text-xs mr-2">編輯</button>
            <button onclick="deleteStudent('${s.account}')" class="text-red-500 hover:underline text-xs">刪除</button>
          </td>
        `;
        tbody.appendChild(tr);
      });
    }

    function batchCreateStudents() {
      if (!STATE.currentClassId) return;
      
      const count = parseInt(document.getElementById('batch-student-count').value) || 0;
      const prefix = document.getElementById('batch-student-prefix').value.trim();
      
      if (count <= 0 || !prefix) {
        alert('請輸入有效的數量與前綴。'); return;
      }

      // 尋找目前的流水號最大值，避免重複
      let currentMax = 0;
      db.students.forEach(s => {
        if(s.account.startsWith(prefix)) {
          const numPart = parseInt(s.account.replace(prefix, ''));
          if(!isNaN(numPart) && numPart > currentMax) currentMax = numPart;
        }
      });

      let addedCount = 0;
      for (let i = 1; i <= count; i++) {
        const numStr = String(currentMax + i).padStart(2, '0'); // 例如: 01, 02
        const newAccount = prefix + numStr;
        
        // 防呆: 確定帳號沒重複
        if(!db.students.find(s => s.account === newAccount)) {
           db.students.push({
             account: newAccount,
             name: `學生_${newAccount}`, // 預設名稱
             password: generateRandomPassword(),
             classId: STATE.currentClassId
           });
           addedCount++;
        }
      }

      saveDB();
      renderStudentList();
      renderClassList(); // 更新人數顯示
      showMsg('批次建立成功', `已成功建立 ${addedCount} 筆學生資料。`, 'success');
    }

    function editStudent(account) {
      const s = db.students.find(x => x.account === account);
      if(!s) return;
      
      const newName = prompt(`修改 [${s.account}] 的姓名：`, s.name);
      if (newName !== null) { // 允許空白但不允許 null(取消)
        s.name = newName.trim();
        
        // 詢問是否重設密碼
        if(confirm(`是否要為 ${s.account} 重新產生一組隨機密碼？`)) {
          s.password = generateRandomPassword();
        }
        
        saveDB();
        renderStudentList();
      }
    }

    function deleteStudent(account) {
      if(confirm(`確定要刪除學生 [${account}] 嗎？`)) {
        db.students = db.students.filter(x => x.account !== account);
        saveDB();
        renderStudentList();
        renderClassList();
      }
    }
  </script>
</body>
</html>
